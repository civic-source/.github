<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: rounded square, light fill for dark-mode contrast -->
  <rect width="512" height="512" rx="64" fill="#F0F4F8"/>

  <!-- Civic portico — Navy #1B3A5C -->
  <!-- Pediment (triangle top) — civic architecture -->
  <polygon points="256,100 148,172 364,172" fill="#1B3A5C"/>
  <!-- Entablature (wide bar below pediment) -->
  <rect x="140" y="172" width="232" height="20" rx="3" fill="#1B3A5C"/>
  <!-- Three columns — wider spacing, clearly pillars not bars -->
  <rect x="168" y="192" width="32" height="160" rx="6" fill="#1B3A5C"/>
  <rect x="240" y="192" width="32" height="160" rx="6" fill="#1B3A5C"/>
  <rect x="312" y="192" width="32" height="160" rx="6" fill="#1B3A5C"/>
  <!-- Base/stylobate -->
  <rect x="140" y="352" width="232" height="20" rx="3" fill="#1B3A5C"/>

  <!-- Delta symbol — Teal #0D7377, bottom-right overlap -->
  <polygon points="370,290 424,392 316,392" fill="#0D7377"/>

  <!-- Amber accent — small circle near delta center -->
  <circle cx="370" cy="365" r="9" fill="#D4A843"/>
</svg>
